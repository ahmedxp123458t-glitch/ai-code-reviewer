<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Code Reviewer</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-50 min-h-screen"><div class="max-w-4xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold text-gray-800 mb-2">AI Code Reviewer</h1><p class="text-gray-600 mb-6">Paste your code or upload a file to get an AI-powered code review.</p><div class="bg-white rounded-lg shadow p-6 mb-6"><h2 class="text-lg font-semibold mb-4">Submit Code for Review</h2><div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Paste your code</label><textarea id="codeInput" rows="10" class="w-full border rounded px-3 py-2 font-mono text-sm" placeholder="// paste your code here"></textarea></div><div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Language</label><select id="langSelect" class="border rounded px-3 py-2"><option value="python">Python</option><option value="javascript">JavaScript</option><option value="typescript">TypeScript</option><option value="java">Java</option><option value="cpp">C++</option><option value="go">Go</option></select></div><div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Or upload a file</label><input type="file" id="fileInput" class="w-full"></div><button onclick="submitReview()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Submit Review</button></div><div id="result" class="hidden bg-white rounded-lg shadow p-6"></div></div><script>async function submitReview(){const btn=event.target;btn.disabled=true;btn.textContent="Reviewing...";const code=document.getElementById("codeInput").value;const lang=document.getElementById("langSelect").value;const fileInput=document.getElementById("fileInput");const formData=new FormData();if(fileInput.files.length>0){formData.append("file",fileInput.files[0])}else{formData.append("code",code)}formData.append("language",lang);try{const r=await fetch("/api/review",{method:"POST",body:formData});const d=await r.json();document.getElementById("result").classList.remove("hidden");document.getElementById("result").innerHTML=`<h3 class="font-semibold text-lg mb-2">Review Results</h3><pre class="bg-gray-100 p-4 rounded text-sm overflow-x-auto">${JSON.stringify(d,null,2)}</pre>`}catch(e){alert("Error: "+e.message)}finally{btn.disabled=false;btn.textContent="Submit Review"}}</script></body></html>
